<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard SST — SESMT HRVJ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --navy-950:#0B1622;
    --navy-900:#10233A;
    --navy-800:#17324F;
    --navy-700:#1F4160;
    --blue-accent:#2F7BC4;
    --blue-accent-soft:#E7F1FB;
    --red-critical:#C00000;
    --red-critical-soft:#FBE9E9;
    --amber-warning:#C07000;
    --amber-warning-soft:#FBF1E0;
    --green-good:#1F7A1F;
    --green-good-soft:#E9F5E9;
    --bg:#F4F6F9;
    --card:#FFFFFF;
    --text:#1B2430;
    --text-muted:#64748B;
    --border:#E2E8F0;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    min-height:100vh;
  }
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;}

  /* ---------- SIDEBAR ---------- */
  .sidebar{
    width:230px;
    flex-shrink:0;
    background:linear-gradient(180deg,var(--navy-950),var(--navy-900) 60%,var(--navy-800));
    color:#fff;
    display:flex;
    flex-direction:column;
    position:sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
  }
  .sidebar-brand{
    padding:22px 20px 16px;
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  .sidebar-brand .eyebrow{
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:#8FB8E0;
    font-weight:600;
  }
  .sidebar-brand h1{
    font-size:19px;
    margin:4px 0 0;
    font-weight:600;
    line-height:1.25;
  }
  .nav{list-style:none;margin:0;padding:14px 10px;flex:1;}
  .nav li{margin-bottom:2px;}
  .nav button{
    width:100%;
    text-align:left;
    background:transparent;
    border:none;
    color:#C6D6E6;
    padding:10px 12px;
    border-radius:8px;
    font-size:14px;
    font-family:inherit;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:10px;
    transition:background .15s ease, color .15s ease;
  }
  .nav button:hover{background:rgba(255,255,255,.06);color:#fff;}
  .nav button.active{background:var(--blue-accent);color:#fff;font-weight:600;}
  .nav .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.6;flex-shrink:0;}
  .sidebar-footer{
    padding:14px 20px 18px;
    border-top:1px solid rgba(255,255,255,.08);
    font-size:11.5px;
    color:#7C93AC;
    line-height:1.5;
  }

  /* ---------- MAIN ---------- */
  .main{flex:1;min-width:0;}
  .topbar{
    background:var(--card);
    border-bottom:1px solid var(--border);
    padding:16px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
    position:sticky;
    top:0;
    z-index:5;
  }
  .topbar h2{margin:0;font-size:18px;font-weight:600;}
  .topbar .meta{font-size:12.5px;color:var(--text-muted);margin-top:2px;}
  .topbar-actions{display:flex;gap:8px;align-items:center;}
  .btn{
    font-family:inherit;
    font-size:13px;
    font-weight:600;
    padding:8px 14px;
    border-radius:8px;
    border:1px solid var(--border);
    background:#fff;
    color:var(--text);
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:6px;
    transition:filter .15s ease;
  }
  .btn:hover{filter:brightness(.97);}
  .btn-primary{background:var(--blue-accent);border-color:var(--blue-accent);color:#fff;}
  .config-box{
    display:flex;gap:8px;align-items:center;
    background:var(--bg);border:1px solid var(--border);
    padding:6px 8px;border-radius:8px;
  }
  .config-box input{
    font-family:inherit;font-size:12.5px;
    border:none;background:transparent;outline:none;
    width:260px;color:var(--text);
  }

  .content{padding:24px 28px 60px;}
  .panel{display:none;}
  .panel.active{display:block;animation:fadein .25s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  /* ---------- KPI CARDS ---------- */
  .kpi-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
    gap:14px;
    margin-bottom:22px;
  }
  .kpi-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px 18px;
    position:relative;
    overflow:hidden;
  }
  .kpi-card::before{
    content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
    background:var(--stripe,var(--blue-accent));
  }
  .kpi-card .label{font-size:12px;color:var(--text-muted);font-weight:500;margin-bottom:6px;}
  .kpi-card .value{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;line-height:1;}
  .kpi-card .sub{font-size:11.5px;color:var(--text-muted);margin-top:6px;}

  .charts-row{
    display:grid;grid-template-columns:1.3fr 1fr;gap:16px;margin-bottom:24px;
  }
  @media(max-width:900px){.charts-row{grid-template-columns:1fr;}}
  .chart-card{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:18px;
  }
  .chart-card h3{margin:0 0 12px;font-size:14px;font-weight:600;}
  .chart-card canvas{max-height:230px;}

  /* ---------- TABLE TOOLBAR ---------- */
  .table-toolbar{
    display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px;
  }
  .search-input{
    flex:1;min-width:220px;
    font-family:inherit;font-size:13px;
    padding:9px 12px;border:1px solid var(--border);border-radius:8px;
    background:#fff;
  }
  .select{
    font-family:inherit;font-size:13px;padding:9px 10px;
    border:1px solid var(--border);border-radius:8px;background:#fff;
  }
  .count-pill{
    font-size:12px;color:var(--text-muted);white-space:nowrap;
  }

  /* ---------- TABLE ---------- */
  .table-wrap{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    overflow:auto;
  }
  table{width:100%;border-collapse:collapse;font-size:12.8px;}
  thead th{
    text-align:left;position:sticky;top:0;background:#F8FAFC;
    padding:10px 12px;font-weight:600;color:var(--text-muted);
    border-bottom:1px solid var(--border);white-space:nowrap;
    font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;
  }
  tbody td{
    padding:9px 12px;border-bottom:1px solid var(--border);
    white-space:nowrap;max-width:260px;overflow:hidden;text-overflow:ellipsis;
  }
  tbody tr{border-left:4px solid transparent;}
  tbody tr.status-critico{border-left-color:var(--red-critical);}
  tbody tr.status-intermediario{border-left-color:var(--amber-warning);}
  tbody tr.status-favoravel{border-left-color:var(--green-good);}
  tbody tr:hover td{background:#FAFBFC;}
  .expand-btn{
    background:none;border:none;cursor:pointer;color:var(--blue-accent);font-size:12px;font-weight:600;
  }
  .detail-row td{
    background:#F8FAFC;white-space:normal;font-size:12px;color:var(--text-muted);
    padding:12px 16px;
  }
  .detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px 18px;}
  .detail-grid b{color:var(--text);font-weight:600;}

  .pagination{
    display:flex;justify-content:space-between;align-items:center;
    padding:10px 4px;font-size:12.5px;color:var(--text-muted);
  }
  .pagination .btn{padding:6px 10px;font-size:12.5px;}

  .badge{
    display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;
  }
  .badge-critico{background:var(--red-critical-soft);color:var(--red-critical);}
  .badge-intermediario{background:var(--amber-warning-soft);color:var(--amber-warning);}
  .badge-favoravel{background:var(--green-good-soft);color:var(--green-good);}
  .badge-neutro{background:var(--bg);color:var(--text-muted);}

  .empty-state{
    text-align:center;padding:60px 20px;color:var(--text-muted);
  }
  .empty-state .icon{font-size:32px;margin-bottom:10px;}

  .subnav{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .subnav button{
    font-family:inherit;font-size:12.5px;font-weight:600;
    padding:7px 14px;border-radius:20px;border:1px solid var(--border);
    background:#fff;color:var(--text-muted);cursor:pointer;
  }
  .subnav button.active{background:var(--navy-900);color:#fff;border-color:var(--navy-900);}

  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:#D3DCE6;border-radius:6px;}

  @media (prefers-reduced-motion: reduce){
    .panel.active{animation:none;}
  }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="eyebrow">SESMT · Hospital Regional</div>
    <h1>Dashboard SST<br>HRVJ</h1>
  </div>
  <ul class="nav" id="nav-list">
    <li><button data-panel="visao-geral" class="active"><span class="dot"></span>Visão Geral</button></li>
    <li><button data-panel="atendimento"><span class="dot"></span>Atendimento Médico</button></li>
    <li><button data-panel="absenteismo"><span class="dot"></span>Absenteísmo</button></li>
    <li><button data-panel="acidentes"><span class="dot"></span>Acidentes/Incidentes</button></li>
    <li><button data-panel="extintor"><span class="dot"></span>Extintores</button></li>
    <li><button data-panel="saude"><span class="dot"></span>Saúde Ocupacional</button></li>
    <li><button data-panel="documentos"><span class="dot"></span>Documentos/CIPA</button></li>
  </ul>
  <div class="sidebar-footer">Dados via Google Sheets<br>Atualização automática ao carregar a página</div>
</aside>

<main class="main">
  <div class="topbar">
    <div>
      <h2 id="topbar-title">Visão Geral</h2>
      <div class="meta" id="topbar-meta">Carregando dados…</div>
    </div>
    <div class="topbar-actions">
      <div class="config-box" title="URL do Web App do Apps Script">
        <span style="font-size:12px;color:var(--text-muted);">URL:</span>
        <input id="apps-script-url" placeholder="https://script.google.com/macros/s/.../exec">
      </div>
      <button class="btn" id="btn-save-url">Salvar</button>
      <button class="btn btn-primary" id="btn-refresh">↻ Atualizar</button>
    </div>
  </div>

  <div class="content" id="content-root">

    <!-- VISÃO GERAL -->
    <section class="panel active" id="panel-visao-geral">
      <div class="kpi-grid" id="kpi-grid"></div>
      <div class="charts-row">
        <div class="chart-card">
          <h3>Registros por área</h3>
          <canvas id="chart-overview-bar"></canvas>
        </div>
        <div class="chart-card">
          <h3>Documentos/Treinamentos por situação</h3>
          <canvas id="chart-overview-donut"></canvas>
        </div>
      </div>
    </section>

    <!-- ATENDIMENTO -->
    <section class="panel" id="panel-atendimento">
      <div id="table-atendimento"></div>
    </section>

    <!-- ABSENTEISMO -->
    <section class="panel" id="panel-absenteismo">
      <div id="table-absenteismo"></div>
    </section>

    <!-- ACIDENTES -->
    <section class="panel" id="panel-acidentes">
      <div class="subnav" id="subnav-acidentes"></div>
      <div id="table-acidentes"></div>
    </section>

    <!-- EXTINTOR -->
    <section class="panel" id="panel-extintor">
      <div id="table-extintor"></div>
    </section>

    <!-- SAUDE -->
    <section class="panel" id="panel-saude">
      <div class="subnav" id="subnav-saude"></div>
      <div id="table-saude"></div>
    </section>

    <!-- DOCUMENTOS -->
    <section class="panel" id="panel-documentos">
      <div class="subnav" id="subnav-documentos"></div>
      <div id="table-documentos"></div>
    </section>

  </div>
</main>

<script>
/* ============================================================================
   CONFIG
   ============================================================================ */
const DEFAULT_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwUoapWpQnup7-mhwDla1LxS8SJaJWlFK3hBiAev-0v8oycqJkknyXaspsLTXq1NPDt/exec';
const STORAGE_KEY = 'hrvj_dashboard_apps_script_url';

let RAW_DATA = null;
const PAGE_SIZE = 50;

/* ============================================================================
   JSONP LOADER (necessário porque o Apps Script não manda CORS headers)
   ============================================================================ */
function jsonpFetch(url) {
  return new Promise((resolve, reject) => {
    const cbName = 'hrvjCallback_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);
    const script = document.createElement('script');
    const cleanup = () => { delete window[cbName]; script.remove(); };
    const timeout = setTimeout(() => { cleanup(); reject(new Error('Tempo esgotado ao buscar dados.')); }, 30000);
    window[cbName] = (data) => { clearTimeout(timeout); cleanup(); resolve(data); };
    script.src = url + (url.indexOf('?') > -1 ? '&' : '?') + 'callback=' + cbName;
    script.onerror = () => { clearTimeout(timeout); cleanup(); reject(new Error('Falha ao carregar o script (URL errada ou sem acesso).')); };
    document.body.appendChild(script);
  });
}

function getAppsScriptUrl() {
  return localStorage.getItem(STORAGE_KEY) || DEFAULT_APPS_SCRIPT_URL;
}

/* ============================================================================
   HELPERS DE APRESENTAÇÃO
   ============================================================================ */
function esc(v) {
  if (v === null || v === undefined) return '';
  return String(v).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function labelize(key) {
  return key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

// Infere status (crítico / intermediário / favorável) a partir de campos comuns
function inferStatus(rec) {
  const candidates = [rec.status, rec.situacao, rec.vencimento, rec.comparecimento, rec.houve_lesao];
  const text = candidates.filter(Boolean).join(' ').toUpperCase();
  if (!text) return null;
  if (/VENCIDO|NAO CONFORME|NÃO CONFORME|PENDENTE|NAO\b.*COMPARECEU|CRITIC/.test(text)) return 'critico';
  if (/PROXIMO|ATENCAO|INCOMPLETO|AGUARDANDO/.test(text)) return 'intermediario';
  if (/CONFORME|EM DIA|OK\b|ATUALIZADO|SIM\b|COMPLETO/.test(text)) return 'favoravel';
  return null;
}

function statusBadge(status) {
  if (!status) return '';
  const labelMap = { critico: 'Crítico', intermediario: 'Atenção', favoravel: 'Conforme' };
  return `<span class="badge badge-${status}">${labelMap[status]}</span>`;
}

/* ============================================================================
   RENDERIZADOR GENÉRICO DE TABELA (com busca, paginação e linha de detalhe)
   ============================================================================ */
function renderTable(containerId, records, options) {
  options = options || {};
  const columns = options.columns || inferColumns(records);
  const container = document.getElementById(containerId);
  let currentPage = 1;
  let filtered = records;
  let searchTerm = '';

  function applyFilter() {
    if (!searchTerm) { filtered = records; return; }
    const term = searchTerm.toLowerCase();
    filtered = records.filter(r => Object.values(r).some(v => v !== null && v !== undefined && String(v).toLowerCase().includes(term)));
  }

  function draw() {
    applyFilter();
    const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
    currentPage = Math.min(currentPage, totalPages);
    const start = (currentPage - 1) * PAGE_SIZE;
    const pageRows = filtered.slice(start, start + PAGE_SIZE);

    let html = `
      <div class="table-toolbar">
        <input class="search-input" placeholder="Buscar em todos os campos..." value="${esc(searchTerm)}">
        <span class="count-pill">${filtered.length.toLocaleString('pt-BR')} registro(s)</span>
      </div>`;

    if (!records.length) {
      html += `<div class="empty-state"><div class="icon">—</div>Nenhum dado retornado para esta planilha.<br><span style="font-size:12px;">Confira os <code>_errors</code> na resposta do Apps Script.</span></div>`;
      container.innerHTML = html;
      return;
    }

    html += `<div class="table-wrap"><table><thead><tr><th></th>${columns.map(c => `<th>${esc(labelize(c))}</th>`).join('')}</tr></thead><tbody>`;

    pageRows.forEach((rec, i) => {
      const status = inferStatus(rec);
      const rowClass = status ? 'status-' + status : '';
      const rid = start + i;
      html += `<tr class="${rowClass}" data-rid="${rid}">
        <td><button class="expand-btn" data-toggle="${rid}">+</button></td>
        ${columns.map(c => `<td title="${esc(rec[c])}">${esc(rec[c])}</td>`).join('')}
      </tr>
      <tr class="detail-row" id="detail-${rid}" style="display:none;"><td colspan="${columns.length + 1}">
        <div class="detail-grid">${Object.keys(rec).map(k => `<div><b>${esc(labelize(k))}:</b> ${esc(rec[k])}</div>`).join('')}</div>
      </td></tr>`;
    });

    html += `</tbody></table></div>
      <div class="pagination">
        <span>Página ${currentPage} de ${totalPages}</span>
        <div>
          <button class="btn" data-page="prev">← Anterior</button>
          <button class="btn" data-page="next">Próxima →</button>
        </div>
      </div>`;

    container.innerHTML = html;

    container.querySelector('.search-input').addEventListener('input', (e) => {
      searchTerm = e.target.value;
      currentPage = 1;
      draw();
    });
    container.querySelectorAll('[data-toggle]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-toggle');
        const row = document.getElementById('detail-' + id);
        const isOpen = row.style.display !== 'none';
        row.style.display = isOpen ? 'none' : 'table-row';
        btn.textContent = isOpen ? '+' : '−';
      });
    });
    const prevBtn = container.querySelector('[data-page="prev"]');
    const nextBtn = container.querySelector('[data-page="next"]');
    if (prevBtn) prevBtn.addEventListener('click', () => { if (currentPage > 1) { currentPage--; draw(); } });
    if (nextBtn) nextBtn.addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; draw(); } });
  }

  draw();
}

// Descobre as colunas mais frequentes entre os registros (máx N colunas)
function inferColumns(records, preferred, max) {
  max = max || 9;
  if (!records.length) return [];
  const freq = {};
  records.forEach(r => Object.keys(r).forEach(k => {
    if (k.startsWith('_')) return; // esconde campos internos (_planilha, _aba...) da tabela principal
    freq[k] = (freq[k] || 0) + 1;
  }));
  let keys = Object.keys(freq).sort((a, b) => freq[b] - freq[a]);
  if (preferred && preferred.length) {
    keys = preferred.filter(k => freq[k]).concat(keys.filter(k => !preferred.includes(k)));
  }
  return keys.slice(0, max);
}

/* ============================================================================
   SUB-NAVEGAÇÃO (abas dentro de uma seção, ex: acidentes por tipo/ano)
   ============================================================================ */
function renderSubnav(containerId, options, onSelect) {
  const el = document.getElementById(containerId);
  el.innerHTML = options.map((o, i) =>
    `<button data-idx="${i}" class="${i === 0 ? 'active' : ''}">${esc(o.label)}</button>`
  ).join('');
  el.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      el.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      onSelect(options[+btn.getAttribute('data-idx')]);
    });
  });
  if (options.length) onSelect(options[0]);
}

/* ============================================================================
   KPIs + GRÁFICOS DA VISÃO GERAL
   ============================================================================ */
let chartBar, chartDonut;

function renderVisaoGeral(data) {
  const kpiGrid = document.getElementById('kpi-grid');
  const kpis = [
    { label: 'Atendimentos Médicos', value: data.atendimento.all.length, stripe: 'var(--blue-accent)' },
    { label: 'Registros de Absenteísmo', value: data.absenteismo.all.length, stripe: 'var(--amber-warning)' },
    { label: 'Acidentes/Incidentes', value: data.acidentes.all.length, stripe: 'var(--red-critical)' },
    { label: 'Inspeções de Extintor', value: data.extintor.all.length, stripe: 'var(--blue-accent)' },
    { label: 'ASOs (Saúde Ocupacional)', value: data.saude.asos.length, stripe: 'var(--green-good)' },
    { label: 'Documentos/Treinamentos', value: Object.values(data.documentos).reduce((s, a) => s + a.length, 0), stripe: 'var(--navy-900)' },
  ];
  kpiGrid.innerHTML = kpis.map(k => `
    <div class="kpi-card" style="--stripe:${k.stripe}">
      <div class="label">${esc(k.label)}</div>
      <div class="value">${k.value.toLocaleString('pt-BR')}</div>
    </div>`).join('');

  // Gráfico de barras: registros por área
  const ctxBar = document.getElementById('chart-overview-bar');
  if (chartBar) chartBar.destroy();
  chartBar = new Chart(ctxBar, {
    type: 'bar',
    data: {
      labels: kpis.map(k => k.label),
      datasets: [{ data: kpis.map(k => k.value), backgroundColor: '#2F7BC4', borderRadius: 6 }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: { x: { ticks: { font: { size: 10 } } }, y: { beginAtZero: true } }
    }
  });

  // Gráfico de rosca: documentos por situação (crítico/atenção/conforme)
  const allDocs = Object.values(data.documentos).flat();
  const counts = { critico: 0, intermediario: 0, favoravel: 0, outros: 0 };
  allDocs.forEach(d => {
    const s = inferStatus(d);
    counts[s || 'outros']++;
  });
  const ctxDonut = document.getElementById('chart-overview-donut');
  if (chartDonut) chartDonut.destroy();
  chartDonut = new Chart(ctxDonut, {
    type: 'doughnut',
    data: {
      labels: ['Crítico/Vencido', 'Atenção', 'Conforme', 'Não classificado'],
      datasets: [{ data: [counts.critico, counts.intermediario, counts.favoravel, counts.outros],
        backgroundColor: ['#C00000', '#C07000', '#1F7A1F', '#CBD5E1'] }]
    },
    options: { plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } } }
  });
}

/* ============================================================================
   ORQUESTRAÇÃO PRINCIPAL
   ============================================================================ */
async function loadDashboard() {
  const metaEl = document.getElementById('topbar-meta');
  metaEl.textContent = 'Carregando dados das 6 planilhas…';
  try {
    const url = getAppsScriptUrl();
    const data = await jsonpFetch(url + '?action=all');
    RAW_DATA = data;

    if (data.error) throw new Error(data.error);

    const genDate = data.generated_at ? new Date(data.generated_at).toLocaleString('pt-BR') : '—';
    const errCount = (data._errors || []).length;
    metaEl.textContent = `Atualizado em ${genDate}` + (errCount ? ` · ⚠ ${errCount} aviso(s) — veja o console` : '');
    if (errCount) console.warn('Avisos do Apps Script:', data._errors);

    renderVisaoGeral(data);

    renderTable('table-atendimento', data.atendimento.all, {
      columns: inferColumns(data.atendimento.all, ['data','nome','setor','funcao','cpf','aso','pendencias','status','medico'])
    });

    renderTable('table-absenteismo', data.absenteismo.all, {
      columns: inferColumns(data.absenteismo.all, ['nome','matricula','setor','funcao','data_emissao','cid','periodo_dias','comparecimento'])
    });

    // Acidentes: sub-abas por tipo
    const tiposAcidente = [...new Set(data.acidentes.all.map(r => r._tipo || 'acidente'))];
    renderSubnav('subnav-acidentes',
      [{ label: 'Todos', tipo: null }].concat(tiposAcidente.map(t => ({ label: labelize(t), tipo: t }))),
      (opt) => {
        const filtered = opt.tipo ? data.acidentes.all.filter(r => r._tipo === opt.tipo) : data.acidentes.all;
        renderTable('table-acidentes', filtered, {
          columns: inferColumns(filtered, ['nome','setor','funcao','data_acidente','tipo_acidente','agente_causador','houve_lesao','_ano'])
        });
      });

    renderTable('table-extintor', data.extintor.all, {
      columns: inferColumns(data.extintor.all, ['numero_extintor','pavimento','tipo','local','sinalizacao','lacre','manometro','condicao_carga','placa','_aba'])
    });

    // Saúde: sub-abas (ASOs/vacinas, desligados, atendimentos, atend. psicológicos, unidades parceiras)
    const saudeGroups = [
      { label: 'ASOs / Vacinas', data: data.saude.asos },
      { label: 'Desligados', data: data.saude.desligados },
      { label: 'Atendimentos', data: data.saude.atendimentos },
      { label: 'Atend. Psicológicos', data: data.saude.atendimentos_psicologicos },
    ];
    Object.keys(data.saude.unidades || {}).forEach(u => {
      saudeGroups.push({ label: u, data: data.saude.unidades[u] });
    });
    renderSubnav('subnav-saude', saudeGroups, (opt) => {
      renderTable('table-saude', opt.data, {
        columns: inferColumns(opt.data, ['nome','setor','funcao','sexo','idade','status'])
      });
    });

    // Documentos: sub-abas por tipo (documentos/laudos/fluxos/treinamentos/cipa)
    const docGroups = Object.keys(data.documentos).map(k => ({ label: labelize(k), data: data.documentos[k] }));
    renderSubnav('subnav-documentos', docGroups, (opt) => {
      renderTable('table-documentos', opt.data, {
        columns: inferColumns(opt.data, ['tipo_documento','titulo','data_validade','status','vencimento','situacao','responsavel'])
      });
    });

  } catch (err) {
    metaEl.textContent = '⚠ Erro ao carregar: ' + err.message;
    console.error(err);
  }
}

/* ============================================================================
   NAVEGAÇÃO ENTRE PAINÉIS + CONFIGURAÇÃO DE URL
   ============================================================================ */
document.getElementById('nav-list').addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-panel]');
  if (!btn) return;
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const panelId = btn.getAttribute('data-panel');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + panelId).classList.add('active');
  document.getElementById('topbar-title').textContent = btn.textContent.trim();
});

document.getElementById('btn-refresh').addEventListener('click', loadDashboard);
document.getElementById('btn-save-url').addEventListener('click', () => {
  const val = document.getElementById('apps-script-url').value.trim();
  if (val) { localStorage.setItem(STORAGE_KEY, val); loadDashboard(); }
});

document.getElementById('apps-script-url').value = getAppsScriptUrl();
loadDashboard();
</script>
</body>
</html>
